name: Deploy Next.js Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --include=dev

      - name: Build static export
        run: pnpm next build
        env:
          NODE_ENV: production

      - name: Add .nojekyll to allow _next directory
        run: |
          # If Next.js created zhiqi/ subdir, add .nojekyll there
          if [ -d "out/zhiqi" ]; then
            touch out/zhiqi/.nojekyll
          else
            touch out/.nojekyll
          fi
          # Copy custom 404.html to out root (replacing Next.js generated one)
          rm -f out/404.html
          rm -rf out/404
          cat > out/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/zhiqi/">
          </head>
          <body>
            <p>Redirecting to <a href="/zhiqi/">home page</a>...</p>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
