name: Deploy Next.js Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --include=dev

      - name: Build static export
        run: pnpm next build
        env:
          NODE_ENV: production

      - name: Restructure for GitHub Pages
        run: |
          # Next.js with basePath:'/zhiqi' outputs:
          # out/index.html, out/_next/..., out/admin/..., etc.
          # Resource paths in HTML reference /zhiqi/_next/..., /zhiqi/admin/..., etc.
          # GitHub Pages URL: https://user.github.io/zhiqi/
          # We need: deploy/zhiqi/index.html, deploy/zhiqi/_next/..., etc.
          
          mkdir -p deploy/zhiqi
          cp -r out/* deploy/zhiqi/
          
          # CRITICAL: Remove Next.js generated 404.html (causes redirect loops)
          rm -f deploy/zhiqi/404.html
          rm -rf deploy/zhiqi/404
          
          # CRITICAL: Remove Next.js client-side routing scripts from all HTML files
          # These scripts cause infinite redirect loops on GitHub Pages static hosting
          # We keep CSS and static assets, but strip the router scripts
          find deploy/zhiqi -name "*.html" -type f | while read html_file; do
            # Remove all <script> tags that load Next.js chunks (causes client routing)
            sed -i '/<script.*src="\/zhiqi\/_next\/static\/chunks\//d' "$html_file"
            # Remove inline Next.js data scripts (self.__next_f)
            sed -i '/<script>self\.__next_f/d' "$html_file"
            # Remove the RSC flight data script tag
            sed -i '/id="_R_"/d' "$html_file"
            # Remove nomodule script
            sed -i '/noModule=""/d' "$html_file"
          done
          
          # Add .nojekyll to allow _next directory
          touch deploy/zhiqi/.nojekyll
          
          # Create a simple static 404.html at root level
          cat > deploy/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/zhiqi/">
          </head>
          <body>
            <p>Redirecting to <a href="/zhiqi/">home page</a>...</p>
          </body>
          </html>
          EOF
          
          # Create root index.html that redirects to basePath
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/zhiqi/">
          </head>
          <body>
            <p>Redirecting to <a href="/zhiqi/">application</a>...</p>
          </body>
          </html>
          EOF
          
          # Verify
          echo "=== 部署结构 ==="
          ls deploy/
          ls deploy/zhiqi/ | head -10
          test -f deploy/zhiqi/index.html && echo "✓ index.html 存在" || echo "✗ index.html 不存在"
          test ! -f deploy/zhiqi/404.html && echo "✓ 404.html 已删除" || echo "✗ 404.html 未删除"
          echo "=== 检查脚本是否已移除 ==="
          grep -c "script" deploy/zhiqi/index.html || echo "0 scripts remaining"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
