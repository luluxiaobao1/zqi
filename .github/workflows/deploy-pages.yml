name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --include=dev

      - name: Build Next.js static export
        run: pnpm next build
        env:
          NODE_ENV: production

      - name: Restructure for GitHub Pages
        run: |
          # Create deploy directory structure
          mkdir -p deploy/zhiqi
          
          # Next.js 16 with basePath may output files in two possible structures:
          # Case 1: Flat - out/index.html, out/_next/... (no zhiqi subdir)
          # Case 2: Nested - out/zhiqi/index.html, out/zhiqi/_next/... (with zhiqi subdir)
          # 
          # We need deploy/zhiqi/index.html and deploy/zhiqi/_next/... 
          # to match the URL structure https://user.github.io/zhiqi/
          
          if [ -f "out/zhiqi/index.html" ]; then
            echo "Case 2: Next.js created zhiqi/ subdirectory in output"
            # Copy the zhiqi subdirectory contents directly
            cp -r out/zhiqi/* deploy/zhiqi/
            # Also copy any root-level files that might be needed (like _next if it's at root)
            if [ -d "out/_next" ] && [ ! -d "deploy/zhiqi/_next" ]; then
              cp -r out/_next deploy/zhiqi/
            fi
          else
            echo "Case 1: Flat output structure"
            # Copy all files from out/ to deploy/zhiqi/
            cp -r out/* deploy/zhiqi/
          fi
          
          # Remove Next.js generated 404 pages - they contain client-side routing
          # logic that can cause infinite redirect loops on GitHub Pages
          rm -f deploy/zhiqi/404.html
          rm -rf deploy/zhiqi/404
          
          # Create custom 404.html at root level that redirects to /zhiqi/
          cat > deploy/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/zhiqi/">
          </head>
          <body>
            <p>Redirecting to <a href="/zhiqi/">home page</a>...</p>
          </body>
          </html>
          EOF
          
          # Add .nojekyll to prevent GitHub Pages from ignoring _ prefixed files
          touch deploy/zhiqi/.nojekyll
          
          # Verify deployment structure
          echo "=== 部署目录结构 ==="
          find deploy -maxdepth 2 -type f | head -20
          echo "=== 验证关键文件 ==="
          ls -la deploy/zhiqi/index.html
          ls -la deploy/404.html
          echo "=== 检查双重嵌套 ==="
          if [ -d "deploy/zhiqi/zhiqi" ]; then
            echo "ERROR: 双重嵌套仍然存在！"
            exit 1
          else
            echo "OK: 无双重嵌套"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
