name: Deploy Next.js Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 避免并发部署互相覆盖
concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --include=dev

      - name: Build static export
        run: pnpm next build
        env:
          NODE_ENV: production

      - name: Prepare for GitHub Pages
        run: |
          # GitHub Pages 站点根即为 https://<user>.github.io/zhiqi/
          # Next.js 已配置 basePath:'/zhiqi'，out/ 内资源均引用 /zhiqi/...
          # 因此 out/ 的内容应「直接」作为发布根，绝对不能再额外包一层 zhiqi/，
          # 否则真实内容会落到 /zhiqi/zhiqi/，而 /zhiqi/ 命中跳转页造成死循环。
          set -euo pipefail

          # 允许 _next 等下划线目录被 Pages 提供服务
          touch out/.nojekyll

          # SPA fallback：用首页 HTML 作为 404，由客户端路由接管深链接。
          # 关键：不要用 meta refresh 跳回自身，否则形成无限重定向循环。
          if [ -f out/index.html ]; then
            cp out/index.html out/404.html
          fi

          echo "=== 发布根目录 (out/) ==="
          ls -la out/ | head -25
          test -f out/index.html && echo "✓ index.html 存在" || (echo "✗ 缺少 index.html" && exit 1)
          test -d out/login && echo "✓ login/ 目录存在（trailingSlash 生效）" || echo "⚠ 未发现 login 目录"
          echo "=== 确认 index.html 是应用首页而非跳转页 ==="
          if grep -q "location.replace" out/index.html; then
            echo "✗ index.html 仍是跳转页，部署会死循环" && exit 1
          else
            echo "✓ index.html 是真实应用首页"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
