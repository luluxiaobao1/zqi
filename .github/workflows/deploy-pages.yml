name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --include=dev

      - name: Build Next.js static export
        run: pnpm next build
        env:
          NODE_ENV: production

      - name: Restructure for GitHub Pages
        run: |
          # Simply copy the entire out/ directory to deploy/
          # Next.js with basePath:'/zhiqi' outputs to out/zhiqi/ on CI
          # So deploy/zhiqi/ will naturally exist with the correct structure
          mkdir -p deploy
          cp -r out/. deploy/
          
          # If Next.js output was flat (no zhiqi/ subdir), move files into zhiqi/
          if [ ! -d "deploy/zhiqi" ]; then
            echo "扁平结构：将文件移入 zhiqi/ 子目录"
            mkdir -p /tmp/zhiqi-staging
            mv deploy/* /tmp/zhiqi-staging/ 2>/dev/null || true
            mkdir -p deploy/zhiqi
            cp -r /tmp/zhiqi-staging/. deploy/zhiqi/
            rm -rf /tmp/zhiqi-staging
          fi
          
          # Remove Next.js generated 404 pages
          rm -f deploy/zhiqi/404.html
          rm -rf deploy/zhiqi/404
          
          # Create custom 404.html at root level
          cat > deploy/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/zhiqi/">
          </head>
          <body>
            <p>Redirecting to <a href="/zhiqi/">home page</a>...</p>
          </body>
          </html>
          EOF
          
          # Add .nojekyll
          touch deploy/zhiqi/.nojekyll
          
          # Final verification
          echo "=== 最终部署结构 ==="
          find deploy -maxdepth 2 | sort | head -30
          echo "=== 关键验证 ==="
          test -f deploy/zhiqi/index.html && echo "✓ deploy/zhiqi/index.html 存在" || echo "✗ deploy/zhiqi/index.html 不存在！"
          test ! -d deploy/zhiqi/zhiqi && echo "✓ 无双重嵌套" || echo "✗ 存在双重嵌套！"
          test -f deploy/404.html && echo "✓ deploy/404.html 存在" || echo "✗ deploy/404.html 不存在！"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
