name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --include=dev

      - name: Build Next.js static export
        run: pnpm next build
        env:
          NODE_ENV: production

      - name: Restructure for GitHub Pages
        run: |
          mkdir -p deploy/zhiqi
          
          # Always copy all output files to deploy/zhiqi/
          # This works whether Next.js outputs flat (out/index.html) 
          # or with basePath subdir (out/zhiqi/index.html)
          cp -r out/* deploy/zhiqi/
          
          # If Next.js created a zhiqi/ subdirectory inside out/ (due to basePath),
          # the above copy would create deploy/zhiqi/zhiqi/ (double nesting).
          # In that case, we need to "flatten" by moving contents up one level.
          if [ -d "deploy/zhiqi/zhiqi" ]; then
            echo "检测到双重嵌套，正在修复..."
            # Move the inner zhiqi/ contents to replace the outer
            rm -rf /tmp/zhiqi-fix
            mv deploy/zhiqi/zhiqi /tmp/zhiqi-fix
            rm -rf deploy/zhiqi/*
            cp -r /tmp/zhiqi-fix/* deploy/zhiqi/
            rm -rf /tmp/zhiqi-fix
            echo "双重嵌套已修复"
          fi
          
          # Remove Next.js generated 404.html - it contains client-side routing
          # logic that can cause infinite loops on GitHub Pages
          rm -f deploy/zhiqi/404.html
          rm -rf deploy/zhiqi/404
          
          # Create custom 404.html at root level that redirects to /zhiqi/
          cat > deploy/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0;url=/zhiqi/">
          </head>
          <body>
            <p>Redirecting to <a href="/zhiqi/">home page</a>...</p>
          </body>
          </html>
          EOF
          
          # Add .nojekyll to prevent GitHub Pages from ignoring files starting with _
          touch deploy/zhiqi/.nojekyll
          
          # Verify deployment structure
          echo "=== 部署目录结构 ==="
          ls -la deploy/
          echo "=== zhiqi/ 目录 ==="
          ls deploy/zhiqi/ | head -15
          echo "=== 验证 index.html 存在 ==="
          ls -la deploy/zhiqi/index.html
          echo "=== 验证无双重嵌套 ==="
          ls deploy/zhiqi/zhiqi/ 2>/dev/null && echo "错误：仍然存在双重嵌套！" || echo "OK：无双重嵌套"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
